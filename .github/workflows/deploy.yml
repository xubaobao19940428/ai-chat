name: Deploy to Production

on:
    # 手动触发，支持版本选择
    workflow_dispatch:
        inputs:
            version:
                description: '要部署的版本 (留空则使用当前分支/tag)'
                required: false
                default: ''
                type: string
            rollback_only:
                description: '仅回滚到指定版本（不构建，需要服务器上已有该版本）'
                required: false
                default: false
                type: boolean

    # 创建/发布 Release 时触发
    release:
        types: [published]

    # 推送到 main 分支时触发（可选，如果只想在 release 时部署可以注释掉）
    # push:
    #   branches:
    #     - main

env:
    # 服务器上的部署路径
    DEPLOY_BASE: /home/www/mixu.ai
    # 保留的版本数量
    KEEP_RELEASES: 5

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              if: ${{ !inputs.rollback_only }}
              uses: actions/checkout@v4
              with:
                  ref: ${{ inputs.version || github.ref }}

            - name: Get version info
              id: version
              run: |
                  if [ "${{ inputs.rollback_only }}" == "true" ]; then
                    # 回滚模式：使用输入的版本
                    VERSION="${{ inputs.version }}"
                    if [ -z "$VERSION" ]; then
                      echo "错误：回滚模式需要指定版本号"
                      exit 1
                    fi
                  else
                    # 正常部署：从 package.json 或 git tag 获取版本
                    if [ -n "${{ github.event.release.tag_name }}" ]; then
                      VERSION="${{ github.event.release.tag_name }}"
                    elif [ -n "${{ inputs.version }}" ]; then
                      VERSION="${{ inputs.version }}"
                    else
                      VERSION="$(cat package.json | grep '"version"' | head -1 | sed 's/.*: "\(.*\)".*/\1/')"
                    fi
                  fi
                  # 清理版本号（移除 v 前缀以保持一致性）
                  VERSION="${VERSION#v}"
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "📦 部署版本: $VERSION"

            - name: Install pnpm
              if: ${{ !inputs.rollback_only }}
              uses: pnpm/action-setup@v3
              with:
                  version: 9

            - name: Get pnpm store directory
              if: ${{ !inputs.rollback_only }}
              shell: bash
              run: |
                  echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

            - name: Setup pnpm cache
              if: ${{ !inputs.rollback_only }}
              uses: actions/cache@v4
              with:
                  path: ${{ env.STORE_PATH }}
                  key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/package.json') }}
                  restore-keys: |
                      ${{ runner.os }}-pnpm-store-

            - name: Setup Node.js
              if: ${{ !inputs.rollback_only }}
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Install dependencies
              if: ${{ !inputs.rollback_only }}
              run: pnpm install --no-frozen-lockfile

            - name: Build project
              if: ${{ !inputs.rollback_only }}
              run: |
                  # 清理旧的构建缓存，确保完全重新构建
                  rm -rf .nuxt .output
                  # 直接使用 nuxt build（不用 --mode prod，环境变量已通过 env 注入）
                  npx nuxt build
                  # 验证构建产物
                  if [ ! -f ".output/server/index.mjs" ]; then
                    echo "❌ 构建失败：.output/server/index.mjs 不存在"
                    ls -la .output/ 2>/dev/null || echo ".output 目录不存在"
                    exit 1
                  fi
                  echo "✅ 构建成功，.output/server/index.mjs 已生成"
              env:
                  NUXT_PUBLIC_API_BASE: ${{ secrets.NUXT_PUBLIC_API_BASE || 'https://do.mixu.ai' }}
                  NUXT_PUBLIC_APP_ID: ${{ secrets.NUXT_PUBLIC_APP_ID || '1' }}
                  NUXT_PUBLIC_APP_KEY: ${{ secrets.NUXT_PUBLIC_APP_KEY }}

            - name: Install sshpass and rsync
              if: ${{ !inputs.rollback_only }}
              run: |
                  sudo apt-get update
                  sudo apt-get install -y sshpass rsync

            - name: Prepare server directories
              env:
                  SSHPASS: ${{ secrets.DEPLOY_PASSWORD }}
                  VERSION: ${{ steps.version.outputs.version }}
              run: |
                  sshpass -e ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "bash -l -c '
                    set -x
                    
                    # 创建目录结构
                    mkdir -p ${{ env.DEPLOY_BASE }}/releases
                    mkdir -p ${{ env.DEPLOY_BASE }}/shared
                    
                    # 如果是回滚模式，检查目标版本是否存在
                    if [ \"${{ inputs.rollback_only }}\" == \"true\" ]; then
                      if [ ! -d \"${{ env.DEPLOY_BASE }}/releases/$VERSION\" ]; then
                        echo \"错误：版本 $VERSION 不存在于服务器上\"
                        echo \"可用版本:\"
                        ls -la ${{ env.DEPLOY_BASE }}/releases/
                        exit 1
                      fi
                      echo \"回滚模式：版本 $VERSION 存在，将直接切换\"
                    fi
                  '"

            - name: Sync to server
              if: ${{ !inputs.rollback_only }}
              env:
                  SSHPASS: ${{ secrets.DEPLOY_PASSWORD }}
                  VERSION: ${{ steps.version.outputs.version }}
              run: |
                  # 同步到版本目录
                  RELEASE_DIR="${{ env.DEPLOY_BASE }}/releases/$VERSION"

                  set +e
                  sshpass -e rsync -rLDvz --copy-unsafe-links --ignore-errors -e "ssh -o StrictHostKeyChecking=no" \
                    --exclude 'node_modules' \
                    --exclude '.git' \
                    --exclude '.github' \
                    --delete \
                    ./ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:$RELEASE_DIR/
                  RSYNC_EXIT=$?
                  set -e

                  # 允许 exit code 0 (成功), 23 (部分传输错误), 24 (源文件消失)
                  if [ $RSYNC_EXIT -eq 0 ] || [ $RSYNC_EXIT -eq 23 ] || [ $RSYNC_EXIT -eq 24 ]; then
                    echo "rsync completed with exit code $RSYNC_EXIT (acceptable)"
                    exit 0
                  else
                    echo "rsync failed with exit code $RSYNC_EXIT"
                    exit $RSYNC_EXIT
                  fi

            - name: Switch version and start service
              env:
                  SSHPASS: ${{ secrets.DEPLOY_PASSWORD }}
                  VERSION: ${{ steps.version.outputs.version }}
              run: |
                  sshpass -e ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "bash -l -c '
                    set -x
                    
                    # 加载 Node.js 环境（兼容 nvm / fnm / 系统安装）
                    export NVM_DIR=\"\$HOME/.nvm\"
                    [ -s \"\$NVM_DIR/nvm.sh\" ] && source \"\$NVM_DIR/nvm.sh\"
                    [ -s \"\$HOME/.fnm/fnm\" ] && eval \"\$(\$HOME/.fnm/fnm env)\"
                    export PATH=\"\$HOME/.local/bin:\$HOME/.npm-global/bin:/usr/local/bin:\$PATH\"
                    
                    # 查找 pm2
                    if command -v pm2 &> /dev/null; then
                      PM2_CMD=\"pm2\"
                    elif [ -f \"\$HOME/.npm-global/bin/pm2\" ]; then
                      PM2_CMD=\"\$HOME/.npm-global/bin/pm2\"
                    elif command -v npx &> /dev/null; then
                      PM2_CMD=\"npx --yes pm2\"
                    else
                      echo \"错误：找不到 pm2 或 npx，请先在服务器上安装: npm install -g pm2\"
                      exit 1
                    fi
                    
                    RELEASE_DIR=\"${{ env.DEPLOY_BASE }}/releases/$VERSION\"
                    CURRENT_LINK=\"${{ env.DEPLOY_BASE }}/current\"
                    
                    # 1. 停止当前服务
                    echo \"========== 停止 PM2 服务 ==========\"
                    \$PM2_CMD delete mixu-chat || true
                    
                    # 2. 切换软链接
                    echo \"========== 切换版本到 $VERSION ==========\"
                    rm -f \$CURRENT_LINK
                    ln -sfn \$RELEASE_DIR \$CURRENT_LINK
                    
                    echo \"当前软链接指向:\"
                    ls -la \$CURRENT_LINK
                    
                    # 3. 进入当前版本目录
                    cd \$CURRENT_LINK
                    
                    # 4. 显示版本信息
                    echo \"========== 部署版本信息 ==========\"
                    echo \"版本: $VERSION\"
                    echo \"Package Version: \$(cat package.json | grep version | head -1)\"
                    echo \"==================================\"
                    
                    # 5. 使用 Nitro server 启动（Nuxt 构建产物）
                    if [ -f \".output/server/index.mjs\" ]; then
                      echo \"使用 Nuxt Nitro server 启动...\"
                      
                      # 启动 Nuxt 服务
                      PORT=3000 HOST=0.0.0.0 NITRO_PORT=3000 NITRO_HOST=0.0.0.0 \$PM2_CMD start .output/server/index.mjs --name \"mixu-chat\" --update-env
                    else
                      echo \"错误：找不到 .output/server/index.mjs，构建可能失败\"
                      echo \"目录内容:\"
                      ls -la .output/ 2>/dev/null || echo \".output 目录不存在\"
                      exit 1
                    fi
                    
                    # 6. 等待服务启动并检查状态
                    sleep 3
                    \$PM2_CMD status
                    \$PM2_CMD save
                  '"

            - name: Cleanup old releases
              env:
                  SSHPASS: ${{ secrets.DEPLOY_PASSWORD }}
              run: |
                  sshpass -e ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "bash -l -c '
                    echo \"========== 清理旧版本 ==========\"
                    cd ${{ env.DEPLOY_BASE }}/releases
                    
                    # 列出所有版本，按修改时间排序，保留最新的 N 个
                    RELEASES=\$(ls -t | head -n ${{ env.KEEP_RELEASES }})
                    echo \"保留的版本: \$RELEASES\"
                    
                    # 删除不在保留列表中的版本
                    for dir in */; do
                      dir=\${dir%/}
                      if ! echo \"\$RELEASES\" | grep -q \"^\$dir\$\"; then
                        echo \"删除旧版本: \$dir\"
                        rm -rf \"\$dir\"
                      fi
                    done
                    
                    echo \"当前保留的版本:\"
                    ls -la
                  '"

            - name: Deployment summary
              run: |
                  echo "🎉 部署完成!"
                  echo ""
                  echo "📦 版本: ${{ steps.version.outputs.version }}"
                  echo "🔗 路径: ${{ env.DEPLOY_BASE }}/current -> releases/${{ steps.version.outputs.version }}"
                  echo ""
                  echo "📋 可用操作:"
                  echo "  - 回滚: 手动触发 workflow，勾选 rollback_only，输入版本号"
                  echo "  - 查看版本: ssh 服务器后执行 ls ${{ env.DEPLOY_BASE }}/releases/"
